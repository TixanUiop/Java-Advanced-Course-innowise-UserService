spring:
  main:
    allow-bean-definition-overriding: true
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  cache:
    type: none

logging:
  level:
    root: INFO
    org.springframework: DEBUG