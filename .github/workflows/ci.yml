name: CI Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        options: >-
          --health-cmd="pg_isready -U user -d myappdb" 
          --health-interval=5s 
          --health-timeout=5s 
          --health-retries=10

      redis:
        image: redis:7
        options: >-
          --health-cmd="redis-cli ping" 
          --health-interval=5s 
          --health-timeout=5s 
          --health-retries=10

    env:
      DB_URL: jdbc:postgresql://postgres:5432/myappdb
      DB_USERNAME: user
      DB_PASSWORD: password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build package without tests
        run: mvn clean package -DskipTests

      - name: Wait for Postgres health
        run: |
          echo "Waiting for Postgres to be ready..."
          until PGPASSWORD=$DB_PASSWORD psql -h postgres -U $DB_USERNAME -d myappdb -c '\q'; do
            echo "Postgres is not ready yet..."
            sleep 2
          done
          echo "Postgres is ready"

      - name: Wait for Redis health
        run: |
          echo "Waiting for Redis to be ready..."
          until redis-cli -h redis ping | grep PONG; do
            echo "Redis is not ready yet..."
            sleep 2
          done
          echo "Redis is ready"

      - name: Run Integration Tests
        run: mvn verify -Pdocker

      - name: Code Analysis (SonarQube)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar \
          -Dsonar.projectKey=my-java-project \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=$SONAR_TOKEN

      - name: Build Docker Image
        run: docker build -t spring_app:latest .