name: CI Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: myappdb
        options: >-
          --health-cmd="pg_isready -U user -d myappdb" 
          --health-interval=5s 
          --health-timeout=5s 
          --health-retries=5

      redis:
        image: redis:7
        options: >-
          --health-cmd="redis-cli ping" 
          --health-interval=5s 
          --health-timeout=5s 
          --health-retries=5

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build package without tests
        run: mvn clean package -DskipTests

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres..."
          for i in {1..20}; do
            docker exec ${{ job.services.postgres.id }} pg_isready -U user -d myappdb && break
            sleep 3
          done
          echo "Postgres is ready"

      - name: Wait for Redis
        run: |
          echo "Waiting for Redis..."
          for i in {1..20}; do
            docker exec ${{ job.services.redis.id }} redis-cli ping && break
            sleep 3
          done
          echo "Redis is ready"

      - name: Run Integration Tests
        run: mvn verify -Pintegration-tests

      - name: Code Analysis (SonarQube)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar \
          -Dsonar.projectKey=my-java-project \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=$SONAR_TOKEN

      - name: Build Docker Image
        run: docker build -t spring_app:latest .