name: CI Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: myappdb
        options: >-
          --health-cmd="pg_isready -U user -d myappdb" 
          --health-interval=5s 
          --health-timeout=5s 
          --health-retries=10

      redis:
        image: redis:7
        options: >-
          --health-cmd="redis-cli ping" 
          --health-interval=5s 
          --health-timeout=5s 
          --health-retries=10

    env:
      DB_URL: jdbc:postgresql://localhost:5432/myappdb
      DB_USERNAME: user
      DB_PASSWORD: password
      SPRING_REDIS_HOST: localhost
      SPRING_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build package without tests
        run: mvn clean package -DskipTests

      - name: Wait for Postgres health
        run: |
          echo "Waiting for Postgres to be healthy..."
          for i in {1..20}; do
            status=$(docker inspect --format='{{.State.Health.Status}}' ${{ job.services.postgres.id }})
            if [ "$status" = "healthy" ]; then
              echo "Postgres is ready"
              break
            fi
            sleep 3
          done

      - name: Wait for Redis health
        run: |
          echo "Waiting for Redis to be healthy..."
          for i in {1..20}; do
            status=$(docker inspect --format='{{.State.Health.Status}}' ${{ job.services.redis.id }})
            if [ "$status" = "healthy" ]; then
              echo "Redis is ready"
              break
            fi
            sleep 3
          done

      - name: Run Integration Tests
        run: mvn verify -Pintegration-tests

      - name: Code Analysis (SonarQube)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar \
          -Dsonar.projectKey=my-java-project \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=$SONAR_TOKEN

      - name: Build Docker Image
        run: docker build -t spring_app:latest .