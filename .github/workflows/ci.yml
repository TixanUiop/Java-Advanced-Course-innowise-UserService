name: CI Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: myappdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d myappdb" 
          --health-interval=5s 
          --health-timeout=5s 
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping" 
          --health-interval=5s 
          --health-timeout=5s 
          --health-retries=10

    env:
      DB_URL: jdbc:postgresql://localhost:5432/myappdb
      DB_USERNAME: user
      DB_PASSWORD: password
      SPRING_REDIS_HOST: localhost
      SPRING_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client redis-tools

      - name: Build package without tests
        run: mvn clean package -DskipTests

      - name: Wait for Postgres health
        run: |
          echo "Waiting for Postgres to be ready..."
          for i in {1..30}; do
            if PGPASSWORD=$DB_PASSWORD psql -h localhost -U $DB_USERNAME -d myappdb -c '\q' 2>/dev/null; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Postgres is not ready yet... (attempt $i/30)"
            sleep 2
          done
          echo "Postgres failed to start within timeout"
          exit 1

      - name: Wait for Redis health
        run: |
          echo "Waiting for Redis to be ready..."
          for i in {1..30}; do
            if redis-cli -h localhost ping 2>/dev/null | grep -q PONG; then
              echo "Redis is ready"
              exit 0
            fi
            echo "Redis is not ready yet... (attempt $i/30)"
            sleep 2
          done
          echo "Redis failed to start within timeout"
          exit 1

      - name: Run Integration Tests
        run: mvn verify -Pdocker

      - name: Code Analysis (SonarQube)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
          -Dsonar.projectKey=Java-Advanced-Course-innowise-UserService \
          -Dsonar.organization=tixanuiop \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=$SONAR_TOKEN \
          -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
          -Dsonar.pullrequest.branch=${{ github.head_ref }} \
          -Dsonar.pullrequest.base=${{ github.base_ref }}
      - name: Build Docker Image
        run: docker build -t spring_app:latest .